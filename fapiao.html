<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>云闪付·地铁乘车记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            background: #f3f4f6;
        }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .phone-container {
            width: 100%;
            max-width: 390px;
            height: 100%;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .break-all {
            word-break: break-all;
            overflow-wrap: break-word;
            min-width: 0;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        .card-shadow {
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.04);
        }
        .top-gradient {
            background: linear-gradient(to bottom, #f5f9ff, #ffffff);
        }
        /* 弹窗遮罩：固定全屏 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            visibility: hidden;
        }
        .modal-overlay.active {
            visibility: visible;
        }
        /* 弹窗内容：固定在屏幕上方（距离顶部15%），不随滚动偏移 */
        .modal-content {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 350px;
            max-height: 70vh;
            background: white;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="top-gradient px-4 py-3 flex justify-between items-center shrink-0 border-b border-gray-100">
            <i class="fa fa-angle-left text-[24px] text-text-primary opacity-70"></i>
            <h1 class="text-[18px] font-bold text-text-primary">云闪付交易详情</h1>
            <i id="headphones-btn" class="fa fa-headphones text-[22px] text-text-primary cursor-pointer"></i>
        </div>

        <div class="flex-1 px-4 pt-3 pb-6 overflow-y-auto custom-scroll">
            <div class="bg-white rounded-2xl card-shadow p-5">
                <div class="text-center mb-4">
                    <div class="w-14 h-14 bg-unionpay-green rounded-xl flex items-center justify-center mx-auto mb-3">
                        <svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="8" y="8" width="10" height="10" rx="3" stroke="#00C853" stroke-width="2.5" fill="none"/>
                            <rect x="20" y="8" width="3" height="10" rx="1.5" fill="#00C853"/>
                            <rect x="25" y="8" width="3" height="10" rx="1.5" fill="#00C853"/>
                            <rect x="30" y="8" width="3" height="10" rx="1.5" fill="#00C853"/>
                            <rect x="8" y="20" width="25" height="12" rx="4" stroke="#00C853" stroke-width="2.5" fill="none"/>
                            <rect x="12" y="24" width="4" height="4" rx="1" fill="#00C853"/>
                            <rect x="25" y="24" width="4" height="4" rx="1" fill="#00C853"/>
                            <rect x="13" y="32" width="4" height="2" rx="1" fill="#00C853"/>
                            <rect x="24" y="32" width="4" height="2" rx="1" fill="#00C853"/>
                        </svg>
                    </div>
                    <p class="text-[17px] text-text-primary mb-3">合肥市轨道交通集团有限公司运营分公司</p>
                    <p id="amount-display" class="text-[38px] font-bold text-text-primary leading-tight">-7.00</p>
                </div>
                <div class="border-t border-divider my-4"></div>
                <div class="space-y-[14px]">
                    <div class="flex">
                        <span class="w-24 shrink-0 text-text-muted text-[15px]">当前状态</span>
                        <span class="text-text-primary text-[15px]">交易成功</span>
                    </div>
                    <div class="flex">
                        <span class="w-24 shrink-0 text-text-muted text-[15px]">订单金额</span>
                        <span id="order-amount" class="text-text-primary text-[15px]">¥7.00</span>
                    </div>
                    <div class="flex">
                        <span class="w-24 shrink-0 text-text-muted text-[15px]">付款方式</span>
                        <span class="text-text-primary text-[15px]">工商银行银联储蓄卡[0268]</span>
                    </div>
                    <div class="flex">
                        <span class="w-24 shrink-0 text-text-muted text-[15px]">扣款时间</span>
                        <span id="deduct-time" class="text-text-primary text-[15px]">延迟扣费|--</span>
                    </div>
                    <div class="flex">
                        <span class="w-24 shrink-0 text-text-muted text-[15px]">乘车信息</span>
                        <div id="ride-info" class="text-text-primary text-[15px] leading-snug flex-1"></div>
                    </div>
                    <div class="flex">
                        <span class="w-24 shrink-0 text-text-muted text-[15px]">交易流水号</span>
                        <span class="text-text-primary text-[15px] flex-1 break-all">520870120781626722176</span>
                    </div>
                    <div class="flex">
                        <span class="w-24 shrink-0 text-text-muted text-[15px]">商户订单号</span>
                        <span class="text-text-primary text-[15px] flex-1 break-all">1351626680102305792</span>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <div class="bg-white rounded-2xl card-shadow p-4 flex justify-between items-center active:bg-gray-50">
                    <div class="flex items-center gap-3">
                        <i class="fa fa-rmb text-[15px] text-text-primary"></i>
                        <span class="text-text-primary text-[15px]">在此商户的交易</span>
                    </div>
                    <i class="fa fa-angle-right text-[15px] text-text-muted"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 弹窗：固定在屏幕上方 -->
    <div id="route-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 shrink-0">
                <span class="text-[17px] font-bold text-text-primary">选择路线</span>
                <span id="close-overlay-btn" class="text-[14px] text-text-muted cursor-pointer px-3 py-1 active:opacity-60">取消</span>
            </div>
            <div id="route-list" class="overflow-y-auto custom-scroll flex-1"></div>
            <div class="p-4 border-t border-gray-100 bg-gray-50 shrink-0">
                <p class="text-[14px] text-text-muted mb-2">➕ 自定义路线 (金额决定乘车时长)</p>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="custom-entry" placeholder="进站站点" class="flex-1 px-3 py-2 text-[14px] border border-gray-200 rounded-lg focus:outline-none focus:border-unionpay-icon-green bg-white">
                    <span class="text-text-muted self-center">→</span>
                    <input type="text" id="custom-exit" placeholder="出站站点" class="flex-1 px-3 py-2 text-[14px] border border-gray-200 rounded-lg focus:outline-none focus:border-unionpay-icon-green bg-white">
                </div>
                <div class="flex gap-2">
                    <input type="number" id="custom-amount" placeholder="金额 (元)" step="0.01" inputmode="decimal" class="w-28 px-3 py-2 text-[14px] border border-gray-200 rounded-lg focus:outline-none focus:border-unionpay-icon-green bg-white">
                    <button id="addCustomBtn" class="flex-1 bg-unionpay-icon-green text-white text-[14px] font-medium py-2 rounded-lg active:opacity-80 transition">添加并选择</button>
                </div>
                <p class="text-[11px] text-text-muted mt-2">💡 金额越高，预估乘车时间越长（约1元/12分钟）</p>
            </div>
        </div>
    </div>

    <script>
        const routeOptions = [
            { entry: '南沙河', exit: '青龙岗', amount: '7.00', travelMinutes: 78 },
            { entry: '南沙河', exit: '科大先研院', amount: '7.00', travelMinutes: 70 },
            { entry: '四牌楼', exit: '天鹅湖', amount: '3.00', travelMinutes: 22 }
        ];
        let currentRoute = routeOptions[0];

        function formatDateTime(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return { 
                dateStr: `${year}年${month}月${day}日`, 
                timeStr: `${hours}:${minutes}:${seconds}`
            };
        }

        function updateTimes() {
            const now = new Date();
            const travelMins = currentRoute.travelMinutes || 15;
            const entryTime = new Date(now.getTime() - (travelMins * 60 * 1000) - 13 * 1000);
            const exitTime = new Date(now.getTime() - 24 * 1000);
            const deductTime = new Date(now.getTime() - 5 * 1000);
            const entryFmt = formatDateTime(entryTime);
            const exitFmt = formatDateTime(exitTime);
            const deductFmt = formatDateTime(deductTime);
            document.getElementById('deduct-time').textContent = `延迟扣费|${deductFmt.dateStr} ${deductFmt.timeStr}`;
            document.getElementById('ride-info').innerHTML = `${currentRoute.entry} ${entryFmt.dateStr} ${entryFmt.timeStr}<br>${currentRoute.exit} ${exitFmt.dateStr} ${exitFmt.timeStr}`;
        }

        function updateAmount() {
            document.getElementById('amount-display').textContent = `-${currentRoute.amount}`;
            document.getElementById('order-amount').textContent = `¥${currentRoute.amount}`;
        }

        function refreshUI() {
            updateTimes();
            updateAmount();
        }

        function showRouteSelector() {
            const overlay = document.getElementById('route-overlay');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function hideRouteSelector() {
            const overlay = document.getElementById('route-overlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function selectRoute(index) {
            if (index >= 0 && index < routeOptions.length) {
                currentRoute = routeOptions[index];
                refreshUI();
                hideRouteSelector();
            }
        }

        function renderRouteOptions() {
            const list = document.getElementById('route-list');
            if (!list) return;
            list.innerHTML = '';
            routeOptions.forEach((route, idx) => {
                const isCustom = idx >= 3;
                const div = document.createElement('div');
                div.className = 'p-4 border-b border-gray-100 flex justify-between items-center hover:bg-gray-50 active:bg-gray-100 cursor-pointer';
                const left = document.createElement('div');
                left.className = 'flex-1';
                left.innerHTML = `<span class="text-[16px] text-text-primary">${route.entry} → ${route.exit}</span>
                                  <span class="text-[12px] text-text-muted ml-2">约${route.travelMinutes}分钟</span>`;
                const rightWrap = document.createElement('div');
                rightWrap.className = 'flex items-center gap-3';
                const price = document.createElement('span');
                price.className = 'text-[16px] font-bold text-text-primary';
                price.textContent = `¥${route.amount}`;
                rightWrap.appendChild(price);
                if (isCustom) {
                    const del = document.createElement('i');
                    del.className = 'fa fa-trash-o text-[18px] text-red-400 active:text-red-600';
                    del.style.padding = '6px';
                    del.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm(`删除路线 "${route.entry} → ${route.exit}" 吗？`)) {
                            routeOptions.splice(idx, 1);
                            renderRouteOptions();
                            if (currentRoute === route) {
                                currentRoute = routeOptions[0];
                                refreshUI();
                            }
                        }
                    });
                    rightWrap.appendChild(del);
                }
                div.appendChild(left);
                div.appendChild(rightWrap);
                div.addEventListener('click', () => selectRoute(idx));
                list.appendChild(div);
            });
            if (routeOptions.length === 0) {
                routeOptions.push({ entry: '合肥南站', exit: '合肥火车站', amount: '5.00', travelMinutes: 45 });
                renderRouteOptions();
                currentRoute = routeOptions[0];
                refreshUI();
            }
        }

        function estimateTravelMinutes(amount) {
            const num = parseFloat(amount);
            if (isNaN(num)) return 15;
            let mins = Math.round(num * 12);
            return Math.min(150, Math.max(5, mins));
        }

        function addCustomRoute() {
            const entry = document.getElementById('custom-entry').value.trim();
            const exit = document.getElementById('custom-exit').value.trim();
            let amountRaw = document.getElementById('custom-amount').value.trim();
            if (!entry || !exit || !amountRaw) {
                alert('请完整填写进站、出站站点和金额');
                return;
            }
            const amountNum = parseFloat(amountRaw);
            if (isNaN(amountNum) || amountNum <= 0) {
                alert('请输入有效的金额（大于0）');
                return;
            }
            const formatted = amountNum.toFixed(2);
            const travelMins = estimateTravelMinutes(formatted);
            routeOptions.push({
                entry, exit, amount: formatted, travelMinutes: travelMins
            });
            renderRouteOptions();
            document.getElementById('custom-entry').value = '';
            document.getElementById('custom-exit').value = '';
            document.getElementById('custom-amount').value = '';
            currentRoute = routeOptions[routeOptions.length - 1];
            refreshUI();
            hideRouteSelector();
            const toast = document.createElement('div');
            toast.innerText = '✓ 已添加并切换路线';
            toast.className = 'fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-black/70 text-white px-4 py-2 rounded-full text-[13px] z-50';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function fixKeyboard() {
            const inputs = ['#custom-entry', '#custom-exit', '#custom-amount'].map(s => document.querySelector(s));
            inputs.forEach(input => {
                if (input) {
                    input.addEventListener('focus', () => {
                        setTimeout(() => {
                            const overlay = document.getElementById('route-overlay');
                            if (overlay && overlay.classList.contains('active')) {
                                input.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        }, 200);
                    });
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderRouteOptions();
            refreshUI();
            document.getElementById('headphones-btn').addEventListener('click', showRouteSelector);
            document.getElementById('addCustomBtn').addEventListener('click', addCustomRoute);
            document.getElementById('close-overlay-btn').addEventListener('click', hideRouteSelector);
            const overlay = document.getElementById('route-overlay');
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) hideRouteSelector();
            });
            fixKeyboard();
            const routeListDiv = document.getElementById('route-list');
            if (routeListDiv) routeListDiv.addEventListener('touchmove', (e) => e.stopPropagation());
        });
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) refreshUI();
        });
    </script>
</body>
</html>
